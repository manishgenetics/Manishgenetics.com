<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grow Logs | Manish Genetics</title>
    <style>
        body { background: #0b0f12; color: #fff; font-family: sans-serif; padding: 20px; }

        .log-card { background: #141a1f; padding: 20px; border-radius: 8px; border: 1px solid #00ff87; margin-bottom: 20px; }

        a { color: #00ff87; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        img { width: 100%; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/">← Back Home</a>
